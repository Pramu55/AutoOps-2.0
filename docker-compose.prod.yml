name: autoops-prod

networks:
  autoops:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

x-bounded-logging: &bounded-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

x-app-hardening: &app-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  logging: *bounded-logging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ${AUTOOPS_PROD_ENV_FILE:-.env}
    networks:
      - autoops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    cpus: 1.0
    mem_limit: 1g
    mem_reservation: 512m
    pids_limit: 200
    logging: *bounded-logging
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - autoops
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    security_opt:
      - no-new-privileges:true
    cpus: 0.5
    mem_limit: 384m
    mem_reservation: 128m
    pids_limit: 100
    logging: *bounded-logging
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    <<: *app-hardening
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: ${AUTOOPS_PROD_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    networks:
      - autoops
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    cpus: 1.0
    mem_limit: 1g
    mem_reservation: 256m
    pids_limit: 200
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:4000/health | grep -q ''"status"[[:space:]]*:[[:space:]]*"ok"''',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    <<: *app-hardening
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    restart: unless-stopped
    env_file: ${AUTOOPS_PROD_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    networks:
      - autoops
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    cpus: 1.0
    mem_limit: 1g
    mem_reservation: 256m
    pids_limit: 200
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:4001/healthz | grep -q ''"status"[[:space:]]*:[[:space:]]*"ok"''',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    <<: *app-hardening
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set to the public HTTPS API URL for production}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    restart: unless-stopped
    env_file: ${AUTOOPS_PROD_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set to the public HTTPS API URL for production}
    networks:
      - autoops
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3000:3000'
    cpus: 0.75
    mem_limit: 768m
    mem_reservation: 192m
    pids_limit: 150
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ >/dev/null']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

# Optional connector mounts are intentionally omitted here.
# Production must not mount the Docker socket or Kubernetes client credentials.
# Provider discovery requires a separately reviewed and approved integration design.
